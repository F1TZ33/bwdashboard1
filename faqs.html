<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>FAQs</title>
<link href="assets/css/style.css" rel="stylesheet"/>
<style>
.pageHero{
  position:relative;overflow:hidden;
  background:
    linear-gradient(135deg, rgba(198,40,40,.16), transparent 42%),
    linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.10);border-radius:24px;padding:28px 24px;margin-bottom:18px;
  box-shadow:0 18px 55px rgba(0,0,0,.34);
}
.pageHero::after{
  content:"";position:absolute;top:-70px;right:-70px;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle, rgba(198,40,40,.22), transparent 70%);pointer-events:none;
}
.bubbleGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;}
.editBubble{
  position:relative;overflow:hidden;
  background:
    linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.025)),
    linear-gradient(135deg, rgba(198,40,40,.08), transparent 45%);
  border:1px solid rgba(255,255,255,.10);border-radius:26px;padding:22px 20px 18px;
  box-shadow:0 18px 55px rgba(0,0,0,.30);
}
.editBubble::before{
  content:"";position:absolute;top:0;left:24px;right:24px;height:3px;border-radius:999px;
  background:linear-gradient(90deg, rgba(198,40,40,0), rgba(198,40,40,.9), rgba(198,40,40,0));
}
.editBubble h2{margin:0 0 10px;font-size:21px;color:#fff;}
.editBubble p{margin:0 0 10px;color:#d8dee7;line-height:1.55;}
.editBubble ul{margin:0;padding-left:18px;}
.editBubble li{margin:8px 0;line-height:1.55;color:#d8dee7;}
@media (max-width:900px){.bubbleGrid{grid-template-columns:1fr;}}
</style>
</head>
<body data-page="page">
<div class="container">
<div class="siteHeader"><img alt="Bearing Wholesalers" class="siteLogo" src="assets/img/logo.png"/></div>
<div class="topbar">
  <div class="leftBtns">
    <a class="btn" href="index.html">⤒ Dashboard</a>
  </div>
  <div class="rightBtns">
    <button class="btn" data-action="suggest" type="button">Suggest edit</button>
    <button class="btn" data-action="admin" type="button">Admin</button>
  </div>
</div>

<section class="pageHero">
  <h1>FAQs</h1>
  <p class="subtitle">Frequently asked questions. Use these starter bubbles as editable placeholders for recurring customer or team queries.</p>
</section>

<section class="bubbleGrid">
  <article class="editBubble">
    <h2>Do We Accept Amex?</h2>
    <p></p>
    <ul>
      <li>No.</li>
      </ul>
  </article>

  <article class="editBubble">
    <h2></h2>
    <p>FAQ 2.</p>
    <ul>
      <li>FAQ answer here.</li>
      </ul>
  </article>
</section>
</div>
<script src="assets/js/app.js"></script>
</body>
</html>

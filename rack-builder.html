<script>
function downloadCsv(){
  if(!rackRows.length){
    alert('Build or upload a rack before downloading.');
    return;
  }

  const headers = [
    'Full Bin Location',
    'Bin Code',
    'Part Number',
    'Description',
    'Min',
    'Max',
    'Notes',
    'QR Code'
  ];

  const lines = [headers.join(',')];

  rackRows.forEach(row => {
    row.qr = makeQrPayload(row);
    lines.push([
      row.full,
      row.bin,
      row.part || 'Part',
      row.desc || 'Desc',
      row.min || '0',
      row.max || '1',
      row.notes || '',
      row.qr
    ].join(','));
  });

  const blob = new Blob([lines.join('\n')], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);

  // ✅ NEW FILENAME LOGIC
  const company = document.getElementById('site').value.trim() || 'Company';
  const rack = document.getElementById('rack').value.trim() || 'Rack';

  const today = new Date();
  const date = today.toISOString().slice(0,10);

  function clean(str){
    return str
      .trim()
      .replace(/[^a-z0-9]+/gi, '_')
      .replace(/^_+|_+$/g, '');
  }

  const fileName = `${clean(company)}_${clean(rack)}_${date}.csv`;

  a.download = fileName;

  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rack Builder</title>

<link href="assets/css/style.css" rel="stylesheet"/>

<style>
.rackOutput,
.rackOutput table,
.rackOutput td,
.rackOutput th{
  background:rgba(255,255,255,.03);
  color:var(--text);
  border-color:rgba(255,255,255,.08);
}

.rackOutput table{
  width:100%;
  border-collapse:collapse;
}

.rackOutput td,
.rackOutput th{
  padding:8px 10px;
  border:1px solid rgba(255,255,255,.08);
}

.rackOutput th{
  font-weight:700;
  background:rgba(255,255,255,.06);
}
</style>
</head>

<body>
<div class="container">

  <div class="siteHeader">
    <img class="siteLogo" src="assets/img/logo.png"/>
  </div>

  <div class="topbar">
    <div class="leftBtns">
      <a class="btn" href="index.html">⤒ Dashboard</a>
      <a class="btn" href="resources.html">← Back</a>
    </div>
  </div>

  <section class="heroPanel">
    <h1>Rack Builder</h1>
  </section>

  <section class="card">
    <form id="rackForm">

      <div class="grid-2">
        <div class="field"><label>Customer / Site</label><input id="site"></div>
        <div class="field"><label>Rack / Category</label><input id="category"></div>
        <div class="field"><label>Rack Number</label><input id="rack"></div>
        <div class="field"><label>Number of Shelves</label><input id="shelves" type="number"></div>
        <div class="field"><label>Bins per Shelf</label><input id="bins" type="number"></div>
        <div class="field"><label>Positions per Bin</label><input id="positions" type="number"></div>
      </div>

      <div class="grid-2">
        <div class="field"><label>Part Placeholder</label><input id="part" value="Part"></div>
        <div class="field"><label>Description Placeholder</label><input id="desc" value="Desc"></div>
        <div class="field"><label>Min Placeholder</label><input id="min" value="0"></div>
        <div class="field"><label>Max Placeholder</label><input id="max" value="1"></div>
      </div>

      <div class="btnRow">
        <button type="button" id="generateBtn" class="btn">Generate Rack Map</button>
        <button type="button" id="downloadBtn" class="btn">Download CSV</button>
        <button type="button" id="uploadBtn" class="btn">Upload CSV</button>
        <button type="button" id="resetBtn" class="btn">Reset</button>
      </div>

    </form>

    <div class="rackOutput" id="output"></div>

  </section>
</div>

<script>
const output = document.getElementById('output');
let csvData = [];

function generate(){

  const site = document.getElementById('site').value.trim();
  const category = document.getElementById('category').value.trim();
  const rack = document.getElementById('rack').value.trim();
  const shelves = parseInt(document.getElementById('shelves').value);
  const bins = parseInt(document.getElementById('bins').value);
  const positions = parseInt(document.getElementById('positions').value);

  const part = document.getElementById('part').value || 'Part';
  const desc = document.getElementById('desc').value || 'Desc';
  const min = document.getElementById('min').value || '0';
  const max = document.getElementById('max').value || '1';

  csvData = [];

  let html = '<table><tr><th>Location</th><th>Bin</th><th>Part</th><th>Desc</th><th>Min</th><th>Max</th></tr>';

  for(let s=1;s<=shelves;s++){
    for(let b=1;b<=bins;b++){

      const shelfLetter = String.fromCharCode(64+s);
      const binNum = String(b).padStart(2,'0');

      for(let p=1;p<=positions;p++){

        const posLetter = String.fromCharCode(96+p);
        const binCode = `${shelfLetter}${binNum}${posLetter}`;
        const full = `${site}:${category}:${rack}${binCode}`;

        csvData.push([
          full,
          binCode,
          part,
          desc,
          min,
          max,
          '',
          full
        ]);

        html += `<tr>
          <td>${full}</td>
          <td>${binCode}</td>
          <td>${part}</td>
          <td>${desc}</td>
          <td>${min}</td>
          <td>${max}</td>
        </tr>`;
      }
    }
  }

  html += '</table>';
  output.innerHTML = html;
}

function download(){
  if(!csvData.length) return;

  const headers = ['Full Bin Location','Bin Code','Part','Description','Min','Max','','QR'];
  let csv = headers.join(',') + '\n';

  csvData.forEach(r => {
    csv += r.join(',') + '\n';
  });

  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'rack-map.csv';
  a.click();
}

function reset(){
  document.querySelectorAll('input').forEach(i => i.value = '');
  output.innerHTML = '';
  csvData = [];
}

document.getElementById('generateBtn').onclick = generate;
document.getElementById('downloadBtn').onclick = download;
document.getElementById('resetBtn').onclick = reset;

</script>
</body>
</html>

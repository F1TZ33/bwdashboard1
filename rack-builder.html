<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rack Builder</title>

<link href="assets/css/style.css" rel="stylesheet"/>

<style>
  body{
    padding-top:max(0px, env(safe-area-inset-top));
    padding-bottom:max(28px, calc(env(safe-area-inset-bottom) + 18px));
  }

  .rackCard{
    background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
    border:1px solid rgba(255,255,255,.10);
    border-radius:20px;
    padding:18px;
    box-shadow:0 14px 32px rgba(0,0,0,.16);
  }

  .rackGrid{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:14px;
  }

  .placeholderGrid{
    display:grid;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:14px;
    margin-top:14px;
  }

  .field input{
    width:100%;
    height:48px;
    padding:0 14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.04);
    color:var(--text);
    box-sizing:border-box;
  }

  .btnRow{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:16px;
  }

  .rackOutput{
    margin-top:18px;
    display:grid;
    gap:18px;
  }

  .rackVisual{
    display:grid;
    gap:14px;
    padding:16px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.025);
  }

  .shelf{
    border:1px solid rgba(255,255,255,.10);
    border-radius:14px;
    padding:12px;
    background:rgba(0,0,0,.10);
  }

  .shelfTitle{
    font-weight:800;
    margin-bottom:10px;
    color:var(--text);
  }

  .binRow{
    display:grid;
    gap:8px;
  }

  .binTile{
    min-height:44px;
    border:1px solid rgba(198,40,40,.28);
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:8px;
    background:linear-gradient(180deg, rgba(198,40,40,.12), rgba(198,40,40,.06));
    color:var(--text);
    font-weight:800;
    font-size:12px;
    word-break:break-word;
  }

  .rackTableWrap{
    overflow:auto;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.08);
  }

  .rackTable{
    width:100%;
    border-collapse:collapse;
    min-width:820px;
    background:rgba(255,255,255,.03);
    color:var(--text);
  }

  .rackTable th,
  .rackTable td{
    padding:8px 10px;
    border:1px solid rgba(255,255,255,.08);
    color:var(--text);
  }

  .rackTable th{
    font-weight:800;
    background:rgba(255,255,255,.06);
    text-align:left;
  }

  .rackTable input{
    width:100%;
    min-width:90px;
    height:34px;
    border-radius:9px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.04);
    color:var(--text);
    padding:0 9px;
    box-sizing:border-box;
  }

  .statusNote{
    margin-top:12px;
    color:var(--muted);
    font-size:13px;
  }

  #csvUpload{
    display:none;
  }

  @media (max-width:980px){
    .rackGrid,
    .placeholderGrid{
      grid-template-columns:repeat(2,minmax(0,1fr));
    }
  }

  @media (max-width:760px){
    .container{
      width:100%;
      max-width:100%;
      padding-left:14px;
      padding-right:14px;
      box-sizing:border-box;
      overflow-x:hidden;
    }

    .rackCard{
      padding:14px;
    }

    .rackGrid,
    .placeholderGrid{
      grid-template-columns:1fr;
    }

    .binRow{
      grid-template-columns:repeat(2,minmax(0,1fr)) !important;
    }
  }
</style>
</head>

<body>
<div class="container">

  <div class="siteHeader">
    <img class="siteLogo" src="assets/img/logo.png" alt="Bearing Wholesalers"/>
  </div>

  <div class="topbar">
    <div class="leftBtns">
      <a class="btn" href="index.html">⤒ Dashboard</a>
      <a class="btn" href="resources.html">← Back</a>
    </div>
  </div>

  <section class="heroPanel">
    <h1>Rack Builder</h1>
  </section>

  <section class="rackCard">
    <form id="rackForm">

      <div class="rackGrid">
        <div class="field">
          <label>Customer / Site</label>
          <input id="site" autocomplete="off">
        </div>

        <div class="field">
          <label>Rack / Category</label>
          <input id="category" autocomplete="off">
        </div>

        <div class="field">
          <label>Rack Number</label>
          <input id="rack" autocomplete="off">
        </div>

        <div class="field">
          <label>Number of Shelves</label>
          <input id="shelves" type="number" min="1" autocomplete="off">
        </div>

        <div class="field">
          <label>Bins per Shelf</label>
          <input id="bins" type="number" min="1" autocomplete="off">
        </div>

        <div class="field">
          <label>Positions per Bin</label>
          <input id="positions" type="number" min="1" autocomplete="off">
        </div>
      </div>

      <div class="placeholderGrid">
        <div class="field">
          <label>Part Placeholder</label>
          <input id="partPlaceholder" value="Part" autocomplete="off">
        </div>

        <div class="field">
          <label>Description Placeholder</label>
          <input id="descPlaceholder" value="Desc" autocomplete="off">
        </div>

        <div class="field">
          <label>Min Placeholder</label>
          <input id="minPlaceholder" value="0" autocomplete="off">
        </div>

        <div class="field">
          <label>Max Placeholder</label>
          <input id="maxPlaceholder" value="1" autocomplete="off">
        </div>
      </div>

      <div class="btnRow">
        <button type="button" id="generateBtn" class="btn">Build Rack</button>
        <button type="button" id="downloadBtn" class="btn">Download CSV</button>
        <button type="button" id="uploadBtn" class="btn">Upload CSV</button>
        <button type="button" id="resetBtn" class="btn">Reset</button>
        <input id="csvUpload" type="file" accept=".csv,text/csv">
      </div>

      <div class="statusNote" id="statusNote"></div>

    </form>

    <div class="rackOutput" id="output"></div>
  </section>
</div>

<script>
(() => {
  const output = document.getElementById('output');
  const statusNote = document.getElementById('statusNote');
  const uploadInput = document.getElementById('csvUpload');

  let rackRows = [];

  const headers = [
    'Full Bin Location',
    'Bin Code',
    'Part Number',
    'Description',
    'Min',
    'Max',
    'Notes',
    'QR Code'
  ];

  function val(id){
    return document.getElementById(id).value.trim();
  }

  function safeNumber(id){
    const n = parseInt(val(id), 10);
    return Number.isFinite(n) && n > 0 ? n : 0;
  }

  function pad2(value){
    return String(value).padStart(2, '0');
  }

  function shelfLetter(index){
    return String.fromCharCode(64 + index);
  }

  function posLetter(index){
    return String.fromCharCode(96 + index);
  }

  function csvEscape(value){
    const text = String(value ?? '');
    if(/[",\n\r]/.test(text)){
      return '"' + text.replace(/"/g, '""') + '"';
    }
    return text;
  }

  function parseCsv(text){
    const rows = [];
    let row = [];
    let field = '';
    let inQuotes = false;

    for(let i = 0; i < text.length; i++){
      const ch = text[i];
      const next = text[i + 1];

      if(ch === '"' && inQuotes && next === '"'){
        field += '"';
        i++;
      } else if(ch === '"'){
        inQuotes = !inQuotes;
      } else if(ch === ',' && !inQuotes){
        row.push(field);
        field = '';
      } else if((ch === '\n' || ch === '\r') && !inQuotes){
        if(ch === '\r' && next === '\n') i++;
        row.push(field);
        if(row.some(cell => String(cell).trim() !== '')){
          rows.push(row);
        }
        row = [];
        field = '';
      } else {
        field += ch;
      }
    }

    row.push(field);
    if(row.some(cell => String(cell).trim() !== '')){
      rows.push(row);
    }

    return rows;
  }

  function makeQrPayload(row){
    return JSON.stringify({
      part: row.part || 'Part',
      bin: row.full || '',
      max: row.max || '1'
    });
  }

  function buildRows(){
    const site = val('site');
    const category = val('category');
    const rack = val('rack');
    const shelves = safeNumber('shelves');
    const bins = safeNumber('bins');
    const positions = safeNumber('positions');

    const part = val('partPlaceholder') || 'Part';
    const desc = val('descPlaceholder') || 'Desc';
    const min = val('minPlaceholder') || '0';
    const max = val('maxPlaceholder') || '1';

    if(!shelves || !bins || !positions){
      alert('Enter shelves, bins per shelf, and positions per bin before building the rack.');
      return [];
    }

    const rows = [];

    for(let s = 1; s <= shelves; s++){
      for(let b = 1; b <= bins; b++){
        for(let p = 1; p <= positions; p++){
          const code = `${pad2(rack || '')}${shelfLetter(s)}${pad2(b)}${posLetter(p)}`;
          const full = [site, category, code].filter(Boolean).join(':');

          const row = {
            full,
            bin: code,
            part,
            desc,
            min,
            max,
            notes: ''
          };

          row.qr = makeQrPayload(row);
          rows.push(row);
        }
      }
    }

    return rows;
  }

  function render(){
    if(!rackRows.length){
      output.innerHTML = '';
      return;
    }

    const bins = safeNumber('bins') || Math.max(1, Math.min(6, rackRows.length));

    const shelves = {};
    rackRows.forEach(row => {
      const match = row.bin.match(/[A-Z]/);
      const shelf = match ? match[0] : 'Imported';
      if(!shelves[shelf]) shelves[shelf] = [];
      shelves[shelf].push(row);
    });

    let visual = '<div class="rackVisual">';
    Object.keys(shelves).forEach(shelf => {
      visual += `<div class="shelf">
        <div class="shelfTitle">Shelf ${shelf}</div>
        <div class="binRow" style="grid-template-columns:repeat(${Math.min(bins, 8)}, minmax(0,1fr));">`;

      shelves[shelf].forEach(row => {
        visual += `<div class="binTile" title="${row.full}">${row.bin}<br>${row.part}</div>`;
      });

      visual += '</div></div>';
    });
    visual += '</div>';

    let table = `<div class="rackTableWrap"><table class="rackTable">
      <thead>
        <tr>
          <th>Full Bin Location</th>
          <th>Bin Code</th>
          <th>Part Number</th>
          <th>Description</th>
          <th>Min</th>
          <th>Max</th>
          <th>Notes</th>
          <th>QR Code</th>
        </tr>
      </thead>
      <tbody>`;

    rackRows.forEach((row, index) => {
      table += `<tr>
        <td><input data-index="${index}" data-key="full" value="${escapeHtml(row.full)}"></td>
        <td><input data-index="${index}" data-key="bin" value="${escapeHtml(row.bin)}"></td>
        <td><input data-index="${index}" data-key="part" value="${escapeHtml(row.part)}"></td>
        <td><input data-index="${index}" data-key="desc" value="${escapeHtml(row.desc)}"></td>
        <td><input data-index="${index}" data-key="min" value="${escapeHtml(row.min)}"></td>
        <td><input data-index="${index}" data-key="max" value="${escapeHtml(row.max)}"></td>
        <td><input data-index="${index}" data-key="notes" value="${escapeHtml(row.notes)}"></td>
        <td><input data-index="${index}" data-key="qr" value="${escapeHtml(row.qr)}"></td>
      </tr>`;
    });

    table += '</tbody></table></div>';
    output.innerHTML = visual + table;

    output.querySelectorAll('input').forEach(input => {
      input.addEventListener('focus', () => {
        if((input.dataset.key === 'part' && input.value === 'Part') ||
           (input.dataset.key === 'desc' && input.value === 'Desc')){
          input.value = '';
        }
      });

      input.addEventListener('input', () => {
        const row = rackRows[Number(input.dataset.index)];
        row[input.dataset.key] = input.value;

        if(['part', 'full', 'max'].includes(input.dataset.key)){
          row.qr = makeQrPayload(row);
          const qrInput = output.querySelector(`input[data-index="${input.dataset.index}"][data-key="qr"]`);
          if(qrInput) qrInput.value = row.qr;
        }
      });
    });
  }

  function escapeHtml(value){
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function buildRack(){
    rackRows = buildRows();
    render();
    statusNote.textContent = rackRows.length ? `${rackRows.length} bin locations built.` : '';
  }

  function downloadCsv(){
    if(!rackRows.length){
      alert('Build or upload a rack before downloading.');
      return;
    }

    const lines = [headers.map(csvEscape).join(',')];

    rackRows.forEach(row => {
      row.qr = makeQrPayload(row);
      lines.push([
        row.full,
        row.bin,
        row.part || 'Part',
        row.desc || 'Desc',
        row.min || '0',
        row.max || '1',
        row.notes || '',
        row.qr
      ].map(csvEscape).join(','));
    });

    const blob = new Blob([lines.join('\n')], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'rack-map.csv';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(a.href);
  }

  function uploadCsv(file){
    const reader = new FileReader();

    reader.onload = event => {
      const parsed = parseCsv(String(event.target.result || ''));

      if(parsed.length < 2){
        alert('Could not upload CSV: CSV has a header but no data rows.');
        return;
      }

      const headerRow = parsed[0].map(h => String(h).trim().toLowerCase());
      const dataRows = parsed.slice(1).filter(row => row.some(cell => String(cell || '').trim() !== ''));

      if(!dataRows.length){
        alert('Could not upload CSV: CSV has a header but no data rows.');
        return;
      }

      const findIndex = names => {
        for(const name of names){
          const idx = headerRow.indexOf(name.toLowerCase());
          if(idx >= 0) return idx;
        }
        return -1;
      };

      const idxFull = findIndex(['full bin location','location','full location']);
      const idxBin = findIndex(['bin code','bin','bin location']);
      const idxPart = findIndex(['part number','part','sku']);
      const idxDesc = findIndex(['description','desc']);
      const idxMin = findIndex(['min','minimum']);
      const idxMax = findIndex(['max','maximum','max qty']);
      const idxNotes = findIndex(['notes','note']);
      const idxQr = findIndex(['qr code','qr']);

      rackRows = dataRows.map(row => {
        const item = {
          full: idxFull >= 0 ? row[idxFull] || '' : row[0] || '',
          bin: idxBin >= 0 ? row[idxBin] || '' : row[1] || '',
          part: idxPart >= 0 ? row[idxPart] || 'Part' : row[2] || 'Part',
          desc: idxDesc >= 0 ? row[idxDesc] || 'Desc' : row[3] || 'Desc',
          min: idxMin >= 0 ? row[idxMin] || '0' : row[4] || '0',
          max: idxMax >= 0 ? row[idxMax] || '1' : row[5] || '1',
          notes: idxNotes >= 0 ? row[idxNotes] || '' : row[6] || '',
          qr: idxQr >= 0 ? row[idxQr] || '' : row[7] || ''
        };

        item.qr = item.qr || makeQrPayload(item);
        return item;
      });

      render();
      statusNote.textContent = `${rackRows.length} bin locations uploaded.`;
      uploadInput.value = '';
    };

    reader.readAsText(file);
  }

  function resetAll(){
    document.querySelectorAll('input').forEach(input => {
      if(input.type !== 'file') input.value = '';
    });

    output.innerHTML = '';
    statusNote.textContent = '';
    rackRows = [];
  }

  document.getElementById('generateBtn').addEventListener('click', buildRack);
  document.getElementById('downloadBtn').addEventListener('click', downloadCsv);
  document.getElementById('uploadBtn').addEventListener('click', () => uploadInput.click());
  document.getElementById('resetBtn').addEventListener('click', resetAll);

  uploadInput.addEventListener('change', () => {
    const file = uploadInput.files && uploadInput.files[0];
    if(file) uploadCsv(file);
  });
})();
</script>
</body>
</html>
